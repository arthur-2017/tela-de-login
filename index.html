<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tela de login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="media.css">



  


    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />


<body>
    <main>
        <section id="login">
            <div id="imagem">

            </div>

            <div id="formulario">
                <h1>login</h1>

                <div>
                    <p id="ad">seja bem-vindo (a) novamente. meu nome é arthur faça login para acessar sua conta e pode fazer as configuraçoes no seu
                        ambiente. </p>
                </div>

                <form action="" method="post" autocomplete="on">
                    <div class="campo">
                        <span class="material-symbols-outlined">
                            mark_email_read
                        </span>
                        <input type="email" name="login" id="login" placeholder="seu email" autocomplete="email" required maxlength="30">
                        <label for="login">login</label>
                    </div>

                    <div class="campo">


                        <span class="material-symbols-outlined">
                            vpn_key
                        </span>
                        <input type="password" name="senha" id="senha" placeholder="sua senha" autocomplete="current-password" required minlength="8" maxlength="30">
                        <label for="senha">senha</label>

                    </div>

                <a href="#" id="en">entrar</a>
                    
                    <a href="#" class="botao">esquici a senha <span class="material-symbols-outlined">
                        vpn_key
                    </span></a> 
                </form>
            </div>
        </section>


    </main>
</body>

</html>
